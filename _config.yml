defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "index.md"
    values:
      layout: "homepage"
      nav_enabled: false
      sitemap: true
  - scope:
      path: "confirmation.md"
    values:
      layout: "confirmation"
      nav_enabled: false
      sitemap: true
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - vendor/
  - node_modules/
  - tmp/
  - Gemfile.lock

search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 5
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true
enable_copy_code_button: true
nav_enabled: true
nav_sort: case_sensitive
nav_error_report: false

back_to_top: true
back_to_top_text: "Back to top"
gh_edit_link: false
last_edit_timestamp: false
color_scheme: pool

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

sass:
  quiet_deps: true
  silence_deprecations:
    - import
